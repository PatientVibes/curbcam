name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: gates (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create venv + install (dev extras)
        run: |
          uv venv --python ${{ matrix.python }}
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run --no-sync ruff check .

      - name: Ruff format check
        run: uv run --no-sync ruff format --check .

      - name: Mypy (strict)
        run: uv run --no-sync mypy src/curbcam

      - name: Tests (e2e excluded via addopts -m 'not e2e')
        run: uv run --no-sync pytest -q

  # Aggregate the matrix into a single stable status context named "gates" so
  # branch protection can require "gates" without pinning each matrix leg
  # (the per-leg checks are "gates (py3.12)" / "gates (py3.13)").
  gates-all:
    name: gates
    if: always()
    needs: [gates]
    runs-on: ubuntu-latest
    steps:
      - name: Require all gates legs to pass
        run: |
          if [ "${{ needs.gates.result }}" != "success" ]; then
            echo "gates matrix result: ${{ needs.gates.result }}"
            exit 1
          fi
